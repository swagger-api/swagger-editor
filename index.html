<!DOCTYPE html>
<html lang="en">
  <head>
    <title>SwaggerEditor</title>
    <link rel="preload" href="/static/media/splash-screen/loader.gif" as="image" type="image/gif" />
    <link rel="preload" href="/static/media/splash-screen/logo.svg" as="image" type="image/svg+xml" />
    <link rel="preload" href="/static/media/splash-screen/styles.css" as="style" type="text/css" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="SwaggerEditor" />
    <meta http-equiv="Cache-control" content="no-cache, no-store, must-revalidate" />
    <link rel="icon" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/favicon-32x32.png" />
    <link rel="stylesheet" href="/static/media/splash-screen/styles.css" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Provide a require shim for UMD modules that check for CommonJS environment
      // This prevents "require is not defined" errors in the browser
      if (typeof require === 'undefined') {
        window.require = function() {
          throw new Error('require() is not supported in browser environment');
        };
        window.require.resolve = function() {
          throw new Error('require.resolve() is not supported in browser environment');
        };
      }
    </script>
    <script type="module">
      // Set up Buffer global before app loads
      import { Buffer } from 'buffer';
      window.Buffer = Buffer;
      globalThis.Buffer = Buffer;
    </script>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      // Monaco worker configuration
      // In development, Vite serves from root '/'
      // In production, assets are in '/assets/'
      window.MonacoEnvironment = {
        getWorkerUrl: function (moduleId, label) {
          // For production, workers are in /assets/
          // For development, they're served from root
          const isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
          const base = isDev ? '/' : '/assets/';

          if (label === 'json') {
            return base + 'editor.worker.js';
          }
          if (label === 'css' || label === 'scss' || label === 'less') {
            return base + 'editor.worker.js';
          }
          if (label === 'html' || label === 'handlebars' || label === 'razor') {
            return base + 'editor.worker.js';
          }
          if (label === 'typescript' || label === 'javascript') {
            return base + 'editor.worker.js';
          }
          if (label === 'apidom') {
            return base + 'apidom.worker.js';
          }
          return base + 'editor.worker.js';
        }
      };
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="swagger-editor">
      <div class="swagger-editor">
        <div class="swagger-editor__splash-screen">
          <figure class="swagger-editor__splash-screen-figure">
            <img width="100%" src="/static/media/splash-screen/logo.svg" alt="Swagger Editor" />
            <figcaption>5.1.0</figcaption>
            <img
              width="25"
              height="25"
              class="swagger-editor__splash-screen-spinner"
              src="/static/media/splash-screen/loader.gif"
              alt="Loading..."
            />
          </figure>
        </div>
      </div>
    </div>
  </body>
</html>
